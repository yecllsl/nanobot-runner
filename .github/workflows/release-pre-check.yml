name: Release Pre-Check

on:
  push:
    branches:
      - 'release/*'

jobs:
  pre-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        pip install uv
    
    - name: Install dependencies
      run: |
        uv sync --all-extras
    
    - name: Code Quality Checks
      run: |
        echo "Running code quality checks..."
        uv run black --check src tests
        uv run isort --check-only src tests
        uv run mypy src
        echo "✓ Code quality checks passed"
    
    - name: Security Scan
      run: |
        echo "Running security scan..."
        uv run bandit -r src -f json -o bandit-report.json
        echo "✓ Security scan completed"
    
    - name: Run Tests
      run: |
        echo "Running tests..."
        uv run pytest tests/ -v --cov=src --cov-report=term-missing
        echo "✓ Tests passed"
    
    - name: Build Package
      run: |
        echo "Building package..."
        uv build
        echo "✓ Package built successfully"
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist-${{ matrix.python-version }}
        path: dist/
        retention-days: 7
    
    - name: Pre-Check Summary
      run: |
        echo "======================================"
        echo "Release Pre-Check Summary"
        echo "======================================"
        echo "Python Version: ${{ matrix.python-version }}"
        echo "Status: ✅ PASSED"
        echo "======================================"
        echo ""
        echo "Next Steps:"
        echo "1. Merge this release branch to main"
        echo "2. Create and push version tag"
        echo "3. GitHub Actions will automatically publish the release"
        echo "======================================"
