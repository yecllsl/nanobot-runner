name: Release

on:
  push:
    tags:
      - 'v*'

env:
  PYTHON_VERSION: '3.11'

permissions:
  contents: write

jobs:
  # 构建包
  build:
    name: Build Package
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        echo "正在安装构建依赖..."
        pip install build --no-cache-dir
        echo "构建依赖安装完成"
        
    - name: Verify build dependencies
      run: |
        echo "验证构建依赖..."
        python -m pip list | grep build
        python -c "import build; print('build 模块已安装')"
        echo "构建依赖验证完成"
        
    - name: Build package
      run: |
        echo "开始构建包..."
        python -m build
        echo "构建完成"
        
    - name: Verify build artifacts
      run: |
        echo "验证构建产物..."
        if [ -d "dist" ]; then
          echo "构建产物目录存在：dist"
          ls -la dist/
          echo "构建产物详情:"
          ls -la dist/*
        else
          echo "警告：构建产物目录不存在"
          echo "当前目录文件列表:"
          ls -la
          exit 1
        fi
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

  # 发布到 GitHub Releases
  publish-github:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist-packages
        path: dist/
        
    - name: Verify artifacts
      run: |
        echo "验证下载产物..."
        ls -la dist/
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 发布总结
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: publish-github
    if: always()
    
    steps:
    - name: Generate summary
      run: |
        echo "======================================"
        echo "🎉 Release Summary"
        echo "======================================"
        echo ""
        echo "Version: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo ""
        echo "GitHub Release: ${{ needs.publish-github.result }}"
        echo ""
        if [ "${{ needs.publish-github.result }}" == "success" ]; then
          echo "✅ Release completed successfully!"
        else
          echo "⚠️ Release failed. Check the logs for details."
        fi
        echo "======================================"
