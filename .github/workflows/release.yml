name: Release

on:
  push:
    tags:
      - 'v*'  # 只在推送 v* 标签时触发

env:
  PYTHON_VERSION: '3.11'

permissions:
  contents: write

jobs:
  # 构建包
  build:
    name: Build Package
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Verify tag is on main branch
      run: |
        git fetch origin main:main
        TAG_COMMIT=$(git rev-parse ${{ github.ref_name }})
        if git merge-base --is-ancestor $TAG_COMMIT main; then
          echo "✅ Tag ${{ github.ref_name }} (commit: $TAG_COMMIT) is on main branch"
        else
          echo "❌ Tag ${{ github.ref_name }} (commit: $TAG_COMMIT) is NOT on main branch"
          echo "Only tags on main branch can trigger release"
          exit 1
        fi
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
      
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache uv dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-
    
    - name: Check version consistency
      run: |
        echo "🔍 检查版本号一致性..."
        python scripts/check_version_consistency.py
        
    - name: Install dependencies
      run: |
        echo "正在使用uv安装依赖..."
        uv sync --all-extras
        echo "依赖安装完成"
        
    - name: Build package
      run: |
        echo "开始构建包..."
        uv build
        echo "构建完成"
        
    - name: Verify build artifacts
      run: |
        echo "验证构建产物..."
        if [ -d "dist" ]; then
          echo "构建产物目录存在：dist"
          ls -la dist/
          echo "构建产物详情:"
          ls -la dist/*
        else
          echo "警告：构建产物目录不存在"
          echo "当前目录文件列表:"
          ls -la
          exit 1
        fi
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

  # 发布到 GitHub Releases
  publish-github:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
      
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist-packages
        path: dist/
        
    - name: Verify artifacts
      run: |
        echo "验证下载产物..."
        ls -la dist/
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 发布总结
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: publish-github
    if: always()
    
    steps:
    - name: Generate summary
      run: |
        echo "======================================"
        echo "🎉 Release Summary"
        echo "======================================"
        echo ""
        echo "Version: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo ""
        echo "GitHub Release: ${{ needs.publish-github.result }}"
        echo ""
        if [ "${{ needs.publish-github.result }}" == "success" ]; then
          echo "✅ Release completed successfully!"
        else
          echo "⚠️ Release failed. Check the logs for details."
        fi
        echo "======================================"
