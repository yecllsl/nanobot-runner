name: CI Pipeline

on:
  push:
    branches: [ main, feature/*, hotfix/* ]  # 对 main、feature、hotfix 分支推送触发
  pull_request:
    branches: [ main ]  # 仅对 main 分支的 PR 触发（单人开发模式）
    types: [opened, reopened, synchronize]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # 代码质量检查
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        echo "正在安装开发依赖..."
        pip install -e .[dev,test]
        echo "依赖安装完成"
        echo "安装额外依赖..."
        pip install pytest-cov pytest-mock
        pip install types-requests
        echo "额外依赖安装完成"
        
    - name: Verify tool installations
      run: |
        echo "验证工具安装..."
        python -m black --version
        python -m isort --version
        python -m mypy --version
        python -m bandit --version
        python -m pytest --version
        echo "工具验证完成"
        
    - name: Check code formatting with black
      run: |
        echo "开始代码格式化检查..."
        python -m black --check src/ tests/
        
    - name: Check import sorting with isort
      run: |
        echo "开始导入排序检查..."
        python -m isort --check-only src/ tests/
        
    - name: Type checking with mypy
      run: |
        echo "开始类型检查..."
        python -m mypy src/ --ignore-missing-imports
        
    - name: Security scan with bandit
      run: |
        echo "开始安全扫描..."
        python -m bandit -r src/ -f json -o bandit-report.json -s B101,B601
        
  # 测试执行
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}-${{ matrix.python-version }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}
          ${{ runner.os }}-pip-
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test,dev] --no-cache-dir
        
    - name: Verify test dependencies
      run: |
        echo "验证测试依赖..."
        python -m pytest --version
        python -c "import pytest; print('pytest版本:', pytest.__version__)"
        python -c "import pytest_cov; print('pytest-cov已安装')"
        python -c "import pytest_mock; print('pytest-mock已安装')"
        echo "测试依赖验证完成"
        
    - name: Run unit tests
      run: |
        echo "开始单元测试..."
        python -m pytest tests/unit/ -v --cov=src --cov-report=term-missing --tb=short
        
    - name: Run integration tests
      run: |
        echo "开始集成测试..."
        python -m pytest tests/integration/ -v --tb=short
        
    - name: Run E2E tests
      run: |
        echo "开始端到端测试..."
        timeout 300s python -m pytest tests/e2e/ -v --tb=short  # 5分钟超时
        echo "E2E测试完成"
        
    - name: Generate coverage report
      run: |
        echo "开始生成覆盖率报告..."
        python -m pytest --cov=src --cov-report=xml --cov-report=term-missing
        
    - name: Verify coverage file
      run: |
        echo "验证覆盖率文件..."
        if [ -f "coverage.xml" ]; then
          echo "覆盖率文件已生成: coverage.xml"
          ls -la coverage.xml
        else
          echo "警告: 覆盖率文件未生成"
          echo "当前目录文件列表:"
          ls -la
        fi
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        
  # 构建打包
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [code-quality, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        echo "正在安装构建依赖..."
        pip install build --no-cache-dir
        echo "构建依赖安装完成"
        
    - name: Verify build dependencies
      run: |
        echo "验证构建依赖..."
        python -m pip list | grep build
        python -c "import build; print('build模块已安装')"
        echo "构建依赖验证完成"
        
    - name: Build package
      run: |
        echo "开始构建包..."
        python -m build
        
    - name: Verify build artifacts
      run: |
        echo "验证构建产物..."
        if [ -d "dist" ]; then
          echo "构建产物目录存在: dist"
          ls -la dist/
          echo "构建产物详情:"
          ls -la dist/*
        else
          echo "警告: 构建产物目录不存在"
          echo "当前目录文件列表:"
          ls -la
        fi
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/