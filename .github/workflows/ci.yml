name: CI Pipeline

on:
  push:
    branches: [ main, feature/*, hotfix/* ]  # 对 main、feature、hotfix 分支推送触发
  pull_request:
    branches: [ main ]  # 仅对 main 分支的 PR 触发（单人开发模式）
    types: [opened, reopened, synchronize]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # 代码质量检查
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache uv dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-
        
    - name: Install dependencies
      run: |
        echo "正在使用uv安装依赖..."
        uv sync --all-extras
        echo "依赖安装完成"
        
    - name: Verify tool installations
      run: |
        echo "验证工具安装..."
        uv run black --version
        uv run isort --version
        uv run mypy --version
        uv run bandit --version
        uv run pytest --version
        echo "工具验证完成"
        
    - name: Check code formatting with black
      run: |
        echo "开始代码格式化检查..."
        uv run black --check src/ tests/
        
    - name: Check import sorting with isort
      run: |
        echo "开始导入排序检查..."
        uv run isort --check-only src/ tests/
        
    - name: Type checking with mypy
      run: |
        echo "开始类型检查..."
        uv run mypy src/ --ignore-missing-imports
        
    - name: Security scan with bandit
      run: |
        echo "开始安全扫描..."
        uv run bandit -r src/ -f json -o bandit-report.json -s B101,B601 -ll
        echo "安全扫描完成"
        
    - name: Check bandit results
      run: |
        echo "检查安全扫描结果..."
        if [ -f "bandit-report.json" ]; then
          HIGH_COUNT=$(python -c "import json; data=json.load(open('bandit-report.json')); print(sum(1 for r in data.get('results', []) if r.get('issue_severity') == 'HIGH'))")
          MEDIUM_COUNT=$(python -c "import json; data=json.load(open('bandit-report.json')); print(sum(1 for r in data.get('results', []) if r.get('issue_severity') == 'MEDIUM'))")
          
          echo "HIGH严重性问题: $HIGH_COUNT"
          echo "MEDIUM严重性问题: $MEDIUM_COUNT"
          
          if [ "$HIGH_COUNT" -gt 0 ] || [ "$MEDIUM_COUNT" -gt 0 ]; then
            echo "❌ 发现HIGH或MEDIUM严重性安全问题，请修复后再提交"
            exit 1
          else
            echo "✅ 未发现HIGH或MEDIUM严重性安全问题"
          fi
        else
          echo "⚠️ 安全扫描报告未生成"
        fi
        
  # 测试执行
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache uv dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}-${{ matrix.python-version }}
        restore-keys: |
          ${{ runner.os }}-uv-${{ matrix.python-version }}
          ${{ runner.os }}-uv-
        
    - name: Install dependencies
      run: |
        echo "正在使用uv安装依赖..."
        uv sync --all-extras
        echo "依赖安装完成"
        
    - name: Verify test dependencies
      run: |
        echo "验证测试依赖..."
        uv run pytest --version
        uv run python -c "import pytest; print('pytest版本:', pytest.__version__)"
        uv run python -c "import pytest_cov; print('pytest-cov已安装')"
        uv run python -c "import pytest_mock; print('pytest-mock已安装')"
        echo "测试依赖验证完成"
        
    - name: Run unit tests
      run: |
        echo "开始单元测试..."
        uv run pytest tests/unit/ -v --cov=src --cov-report=term-missing --tb=short
        
    - name: Run integration tests
      run: |
        echo "开始集成测试..."
        uv run pytest tests/integration/ -v --tb=short
        
    - name: Run E2E tests
      run: |
        echo "开始端到端测试..."
        timeout 300s uv run pytest tests/e2e/ -v --tb=short
        echo "E2E测试完成"
      continue-on-error: true
        
    - name: Generate coverage report
      run: |
        echo "开始生成覆盖率报告..."
        uv run pytest --cov=src --cov-report=xml --cov-report=term-missing
        
    - name: Verify coverage file
      run: |
        echo "验证覆盖率文件..."
        if [ -f "coverage.xml" ]; then
          echo "覆盖率文件已生成: coverage.xml"
          ls -la coverage.xml
        else
          echo "警告: 覆盖率文件未生成"
          echo "当前目录文件列表:"
          ls -la
        fi
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        
  # 构建打包
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [code-quality, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
      
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache uv dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-
        
    - name: Install dependencies
      run: |
        echo "正在使用uv安装依赖..."
        uv sync --all-extras
        echo "依赖安装完成"
        
    - name: Verify build dependencies
      run: |
        echo "验证构建依赖..."
        uv run python -c "import hatchling; print('hatchling模块已安装')"
        echo "构建依赖验证完成"
        
    - name: Build package
      run: |
        echo "开始构建包..."
        uv build
        
    - name: Verify build artifacts
      run: |
        echo "验证构建产物..."
        if [ -d "dist" ]; then
          echo "构建产物目录存在: dist"
          ls -la dist/
          echo "构建产物详情:"
          ls -la dist/*
        else
          echo "警告: 构建产物目录不存在"
          echo "当前目录文件列表:"
          ls -la
        fi
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/